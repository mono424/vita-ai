# yaml-language-server: $schema=https://sp00ky.cloud/schema/sp00ky.schema.json
slug: vita-ai
mode: singlenode
deployment:
  ssp_count: 2
schema: packages/schema
version: canary
surrealdb:
  namespace: vitaai
  database: main
frontend:
  dockerfile: ./apps/app/Dockerfile
  context: .
  port: 80
  env:
    - VITE_DB_ENDPOINT=wss://vita-ai-db.stg.spky.cloud/rpc
backends:
  render:
    type: http
    spec: ./packages/render-api/openapi.yaml
    baseUrl: http://host.docker.internal:8765
    method:
      type: outbox
      schema: ./src/outbox/render.surql
      table: jobs_render
    dev:
      type: npm
      script: dev:api
    deploy:
      dockerfile: ./packages/render-api/Dockerfile
      context: ./packages/render-api
      port: 8765
      healthcheck: /health
      timeout: 120
      timeout_overridable: false
  agent:
    type: http
    spec: ./packages/agent-service/openapi.yaml
    baseUrl: http://host.docker.internal:8767
    method:
      type: outbox
      schema: ./src/outbox/agent.surql
      table: jobs_agent
    dev:
      type: npm
      script: dev:agent
      env-file: agent.env.local
    deploy:
      dockerfile: ./packages/agent-service/Dockerfile
      context: ./packages/agent-service
      port: 8767
      env-file: agent.env.local
      healthcheck: /health
      timeout: 180
      timeout_overridable: false
clientTypes:
  - format: typescript
    output: apps/app/src/schema.gen.ts
buckets:
  - ./packages/schema/src/buckets/chat_documents.surql
