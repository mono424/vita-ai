# yaml-language-server: $schema=https://sp00ky.cloud/schema/sp00ky.schema.json
cloudApi: https://api-stg.sp00ky.cloud
slug: vita-ai
mode: singlenode
deployment:
  sspCount: 2
schema: packages/schema
version: canary
surrealdb:
  namespace: vitaai
  database: main
apps:
  app:
    type: frontend
    deploy:
      dockerfile: ./apps/app/Dockerfile
      context: .
      port: 80
    env: "vault"
  render:
    type: backend
    spec: ./packages/render-api/openapi.yaml
    baseUrl: http://host.docker.internal:8765
    method:
      type: outbox
      schema: ./src/outbox/render.surql
      table: jobs_render
    dev:
      type: npm
      script: dev:api
    deploy:
      dockerfile: ./packages/render-api/Dockerfile
      context: ./packages/render-api
      port: 8765
      healthcheck: /health
      timeout: 120
      timeoutOverridable: false
    env:
      vault:
        - "SPKY_DB_URL"
        - "SPKY_DB_USER"
        - "SPKY_DB_PASS"
        - "SPKY_DB_NS"
        - "SPKY_DB_NAME"
  agent:
    type: backend
    spec: ./packages/agent-service/openapi.yaml
    baseUrl: http://host.docker.internal:8767
    method:
      type: outbox
      schema: ./src/outbox/agent.surql
      table: jobs_agent
    dev:
      type: npm
      script: dev:agent
    deploy:
      dockerfile: ./packages/agent-service/Dockerfile
      context: ./packages/agent-service
      port: 8767
      healthcheck: /health
      timeout: 180
      timeoutOverridable: false
    env: "vault" # implicitly imports all env variables from vault
clientTypes:
  - format: typescript
    output: apps/app/src/schema.gen.ts
buckets:
  - ./packages/schema/src/buckets/chat_documents.surql
